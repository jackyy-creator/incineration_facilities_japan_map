<html lang="ja">
<head>
<meta charset="UTF-8">
<title>焼却施設 GIS map｜スマホ対応版</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">

<style>
html, body { width: 100%; height: 100%; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Noto Sans JP", sans-serif; }
#banner {
 position: fixed; top: 0; left: 0; right: 0; z-index: 2000;
 background: rgba(30, 30, 30, 0.92); color: #fff;
 text-align: center; font-size: 12.5px; font-weight: 600;
 padding: 8px 16px; letter-spacing: 0.02em; line-height: 1.5;
 border-bottom: 2px solid #c00;
 pointer-events: none;
}
#map { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
.control-panel {
 position: fixed; top: calc(14px + 40px); right: 14px; z-index: 1000; background: rgba(255,255,255,.97);
 border: 1px solid #cfcfcf; border-radius: 10px; padding: 12px 14px; max-height: 86vh; overflow-y: auto;
 box-shadow: 0 2px 10px rgba(0,0,0,.24); font-size: 13px; min-width: 315px;
}
.control-title { font-weight: 700; font-size: 14px; margin-bottom: 8px; }
.control-panel label { display: block; margin: 6px 0; cursor: pointer; }
.search-box { width: 100%; padding: 7px 8px; border: 1px solid #bbb; border-radius: 6px; margin: 4px 0 6px; font-size: 13px; }
.search-row { display:flex; gap:6px; margin-bottom:8px; }
.btn { border: 1px solid #aaa; background: #f7f7f7; border-radius: 6px; padding: 6px 8px; cursor: pointer; font-size: 12px; }
.btn:hover { background:#e9e9e9; }
.result-count { color:#555; font-size:12px; margin-bottom:8px; }
.legend-panel {
 position: fixed; bottom: 22px; left: 22px; z-index: 1000; background: rgba(255,255,255,.97);
 border: 1px solid #bfbfbf; border-radius: 10px; padding: 12px 14px; max-width: 430px; max-height: 52vh; overflow-y:auto;
 box-shadow: 0 2px 10px rgba(0,0,0,.24); font-size: 12px; line-height: 1.45;
}
.legend-title { font-weight: 700; font-size: 14px; margin-bottom: 5px; }
.legend-desc { color: #555; margin-bottom: 8px; }
.legend-item { display: flex; align-items: center; margin: 4px 0; }
.legend-swatch { width: 16px; height: 16px; border-radius: 50%; margin-right: 8px; border: 1px solid rgba(0,0,0,.3); flex: 0 0 16px; }
.note-panel {
 position: fixed; bottom: 22px; right: 14px; z-index: 1000; background: rgba(255,255,255,.92);
 border: 1px solid #ddd; border-radius: 8px; padding: 8px 10px; font-size: 11px; color: #555; max-width: 320px;
}
.popup-table td { vertical-align: top; border-bottom: 1px solid #eee; padding: 3px 4px; }
.popup-key { font-weight: 600; white-space: nowrap; color: #333; }

/* ===== Mobile / tablet tuning ===== */
* { box-sizing: border-box; }
html { height: -webkit-fill-available; }
body { min-height: 100vh; min-height: 100svh; min-height: -webkit-fill-available; overscroll-behavior: none; }
#map { height: 100vh; height: 100svh; height: 100dvh; background: #d8d8d8; z-index: 0; }
.mobile-toolbar { display: none; }
.leaflet-control-zoom a { width: 34px; height: 34px; line-height: 34px; }
.leaflet-popup-content { margin: 10px 12px; }
.popup-inner { width: min(400px, 76vw); max-height: 58vh; overflow: auto; -webkit-overflow-scrolling: touch; }
@media (max-width: 768px) {
  #banner { font-size: 10.5px; line-height: 1.35; padding: calc(6px + env(safe-area-inset-top)) 10px 6px; }
  .mobile-toolbar { display: flex; position: fixed; left: 10px; right: 10px; bottom: calc(10px + env(safe-area-inset-bottom)); z-index: 2100; gap: 8px; pointer-events: none; }
  .mobile-toolbar .btn { flex: 1; pointer-events: auto; min-height: 42px; font-size: 13px; font-weight: 700; background: rgba(255,255,255,.96); border: 1px solid rgba(0,0,0,.25); box-shadow: 0 2px 10px rgba(0,0,0,.18); }
  .control-panel, .legend-panel { display: none; left: 10px; right: 10px; width: auto; min-width: 0; max-width: none; z-index: 2050; border-radius: 14px; box-shadow: 0 4px 18px rgba(0,0,0,.32); -webkit-overflow-scrolling: touch; }

  .control-panel label { padding: 7px 2px; margin: 2px 0; border-bottom: 1px solid #eee; }
  .search-box { min-height: 42px; font-size: 16px; }
  .search-row .btn { min-height: 40px; font-size: 13px; }
  .note-panel { display: none; }
  .leaflet-top { top: calc(42px + env(safe-area-inset-top)); }
  .leaflet-left { left: 8px; }
  .leaflet-control-attribution { font-size: 9px; max-width: 72vw; }

<div id="map"></div>

  <div id="resultCount" class="result-count"></div>

  <label><input type="radio" name="layerField" value="location" checked> 所在地（デフォルト）</label>
<label><input type="radio" name="layerField" value="annual" > 年間処理量（t/年度）</label>
<label><input type="radio" name="layerField" value="method" > 処理方式</label>
<label><input type="radio" name="layerField" value="furnace" > 炉型式</label>
<label><input type="radio" name="layerField" value="facility_type" > 施設の種類</label>
<label><input type="radio" name="layerField" value="start_year" > 使用開始年度</label>
<label><input type="radio" name="layerField" value="heat_amount" > 余熱利用量（実績値）（MJ）</label>
<label><input type="radio" name="layerField" value="heat_status" > 余熱利用の状況</label>
<label><input type="radio" name="layerField" value="power" > 発電能力(kW)</label>
<label><input type="radio" name="layerField" value="ash_burn" > 灰処理設備の有無（焼却灰）</label>
<label><input type="radio" name="layerField" value="ash_fly" > 灰処理設備の有無（飛灰）</label>
<label><input type="radio" name="layerField" value="operation" > 運転管理体制</label>
<label><input type="radio" name="layerField" value="business_method" > ごみ処理事業実施方式</label>
<label><input type="radio" name="layerField" value="abolition" > 施設の改廃</label>
<label><input type="radio" name="layerField" value="industrial" > 産業廃棄物の搬入の有無</label>
</div>

<div id="legend" class="legend-panel"></div>
<div class="note-panel">

</div>

let currentLayer = L.layerGroup().addTo(map);
let currentFieldId = 'location';
let currentQuery = '';

function num(v) {
  if (v === null || v === undefined || v === '') return null;
  const n = Number(String(v).replace(/,/g,''));
  return Number.isFinite(n) ? n : null;
}

function colorBySteps(colors, t) {
  t = Math.max(0, Math.min(1, t));
  const idx = Math.min(colors.length - 1, Math.floor(t * colors.length));
  return colors[idx];
}

function getNumericColor(value, conf) {
  const n = num(value);
  if (n === null || !conf.breaks || conf.breaks.length < 2) return '#777777';
  const min = conf.breaks[0], max = conf.breaks[conf.breaks.length - 1];
  const t = max === min ? 0.5 : (n - min) / (max - min);
  return colorBySteps(conf.colors, t);
}

function getCategoryColor(value, conf) {
  let v = (value === null || value === undefined || String(value).trim() === '') ? '不明' : String(value).trim();
  let idx = conf.values ? conf.values.indexOf(v) : -1;
  if (idx < 0) return '#777777';
  return conf.colors[idx % conf.colors.length];
}

function radiusFor(d) {
  const cap = num(d['施設全体の処理能力']);
  if (cap === null) return 5.5;
  return Math.max(5, Math.min(12, 3.5 + Math.sqrt(cap) / 5));
}

function popupHtml(d) {
  const cols = ['都道府県名','地方公共団体名','施設名称','施設所在地','年間処理量（t/年度）','処理方式','炉型式','施設の種類','使用開始年度','余熱利用量（実績値）（MJ）','余熱利用の状況','発電能力(kW)','灰処理設備の有無（焼却灰）','灰処理設備の有無（飛灰）','運転管理体制','ごみ処理事業実施方式','施設の改廃','産業廃棄物の搬入の有無'];
  let rows = cols.map(c => `<tr><td class="popup-key">${c}</td><td>${(d[c] ?? '')}</td></tr>`).join('');
  return `<div class="popup-inner"><div style="font-weight:700;font-size:15px;margin-bottom:6px;">${d['施設名称'] || ''}</div><table class="popup-table" style="font-size:12px;border-collapse:collapse;width:100%;">${rows}</table></div>`;
}

function filteredData() {
  const q = currentQuery.trim();
  if (!q) return facilityData;
  return facilityData.filter(d => {
    const pref = String(d['都道府県名'] || '');
    const muni = String(d['地方公共団体名'] || '');
    const addr = String(d['施設所在地'] || '');
    return pref.includes(q) || muni.includes(q) || addr.includes(q);
  });
}

function renderLegend(fieldId) {
  const conf = legendConfigs[fieldId];
  if (!conf) return;
  let items = (conf.items || []).map(item => `
    <div class="legend-item"><span class="legend-swatch" style="background:${item.color}"></span><span>${item.label}</span></div>
  `).join('');
  document.getElementById('legend').innerHTML = `
    <div class="legend-title">${conf.title}</div>
    <div class="legend-desc">${conf.description}</div>
    ${items}
  `;
}

function renderLayer(fieldId = currentFieldId) {
  currentFieldId = fieldId;
  currentLayer.clearLayers();
  const f = fieldConfigs.find(x => x.id === fieldId);
  const legend = legendConfigs[fieldId];
  const data = filteredData();

  data.forEach(d => {
    const lat = num(d['緯度']), lon = num(d['経度']);
    if (lat === null || lon === null) return;

    let color = '#0066cc';
    let r = 5.5;
    if (f.type === 'numeric' || f.type === 'numeric_year') {
      color = getNumericColor(d[f.column], legend);
      r = radiusFor(d);
    } else if (f.type === 'category') {
      color = getCategoryColor(d[f.column], legend);
      r = 6;
    }

    L.circleMarker([lat, lon], {
      radius: r,
      color: '#333333',
      fillColor: color,
      fillOpacity: 0.86,
      weight: 0.8
    }).bindPopup(popupHtml(d), {maxWidth: window.matchMedia('(max-width: 768px)').matches ? 320 : 440})
      .bindTooltip(`${d['施設名称'] || ''}｜${d['都道府県名'] || ''}｜${d['地方公共団体名'] || ''}`)
      .addTo(currentLayer);
  });

  document.getElementById('resultCount').innerHTML = `表示中：<b>${data.length.toLocaleString()}</b> / ${facilityData.length.toLocaleString()} 件`;
  renderLegend(fieldId);
  refreshMapSoon();

  if (currentQuery.trim() && data.length > 0) {
    const bounds = L.latLngBounds(data.map(d => [num(d['緯度']), num(d['経度'])]).filter(x => x[0] !== null && x[1] !== null));
    if (bounds.isValid()) map.fitBounds(bounds.pad(0.15));
  }
}

document.querySelectorAll('input[name="layerField"]').forEach(el => {
  el.addEventListener('change', e => renderLayer(e.target.value));
});

document.getElementById('searchBtn').addEventListener('click', () => {
  currentQuery = document.getElementById('searchInput').value;
  renderLayer(currentFieldId);
});
document.getElementById('clearBtn').addEventListener('click', () => {
  document.getElementById('searchInput').value = '';
  currentQuery = '';
  map.setView([36.5, 137.5], 5);
  renderLayer(currentFieldId);
});
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    currentQuery = e.target.value;
    renderLayer(currentFieldId);
  }
});

renderLayer('location');
</script>
</body>
</html>
